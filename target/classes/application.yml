server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: yudao-module-cpa
  datasource:
    url: jdbc:mysql://localhost:3306/yudao_cpa?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  ai:
    openai:
      api-key: ${AI_OPENAI_API_KEY:sk-xxx}
      base-url: ${AI_OPENAI_BASE_URL:https://api.openai.com}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# CPA 业务配置
cpa:
  ai:
    # 当前使用的模型（改这个值即可切换模型）
    # 可选: openai / claude / qwen / deepseek / zhipu / doubao / ollama
    active-model: ${CPA_AI_MODEL:openai}
    max-retries: 3
    timeout-seconds: 60
    # ====== 各模型配置（按需填写你用的那个） ======
    # OpenAI（GPT系列）
    openai:
      api-key: ${AI_OPENAI_API_KEY:}
      base-url: ${AI_OPENAI_BASE_URL:https://api.openai.com}
      model: gpt-4o
    # Anthropic Claude
    claude:
      api-key: ${AI_CLAUDE_API_KEY:}
      base-url: ${AI_CLAUDE_BASE_URL:https://api.anthropic.com}
      model: claude-sonnet-4-20250514
    # 阿里 通义千问
    qwen:
      api-key: ${AI_QWEN_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-plus
    # DeepSeek
    deepseek:
      api-key: ${AI_DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-chat
    # 智谱 GLM
    zhipu:
      api-key: ${AI_ZHIPU_API_KEY:}
      base-url: https://open.bigmodel.cn/api/paas/v4
      model: glm-4-plus
    # 豆包（字节跳动）
    doubao:
      api-key: ${AI_DOUBAO_API_KEY:}
      base-url: https://ark.cn-beijing.volces.com/api/v3
      model: doubao-pro-32k
    # Ollama 本地模型（免费，无需API Key）
    ollama:
      base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
      model: qwen2.5
  news:
    sources:
      - name: cailian
        url: https://www.cls.cn/api
      - name: sina-finance
        url: https://finance.sina.com.cn
  push:
    default-time: "07:30"
  archive:
    base-path: ${CPA_ARCHIVE_PATH:./data/cpa-archive}

logging:
  level:
    cn.iocoder.yudao.module.cpa: debug
