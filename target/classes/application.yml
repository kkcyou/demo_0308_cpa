server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: yudao-module-cpa
  datasource:
    url: jdbc:mysql://localhost:3306/yudao_cpa?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  ai:
    openai:
      api-key: ${AI_OPENAI_API_KEY:sk-xxx}
      base-url: ${AI_OPENAI_BASE_URL:https://api.openai.com}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# CPA 业务配置
cpa:
  ai:
    primary-model: claude-sonnet-4-20250514
    fallback-model: gpt-4o
    local-model: ollama/qwen2.5
    max-retries: 3
    timeout-seconds: 60
    # Anthropic Claude API
    claude:
      api-key: ${AI_CLAUDE_API_KEY:}
      base-url: ${AI_CLAUDE_BASE_URL:https://api.anthropic.com}
    # Ollama 本地模型
    ollama:
      base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
  news:
    sources:
      - name: cailian
        url: https://www.cls.cn/api
      - name: sina-finance
        url: https://finance.sina.com.cn
  push:
    default-time: "07:30"
  archive:
    base-path: ${CPA_ARCHIVE_PATH:./data/cpa-archive}

logging:
  level:
    cn.iocoder.yudao.module.cpa: debug
